# Configuration Railway pour Club Internet Access Backend
# Railway utilise principalement railway.json et docker-compose.prod.yml
# Ce fichier est optionnel et peut être utilisé pour des configurations supplémentaires

[build]
builder = "DOCKERFILE"
dockerfile = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
PORT = "4000"
