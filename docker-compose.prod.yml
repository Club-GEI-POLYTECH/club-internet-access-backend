# Docker Compose pour la PRODUCTION
# NOTE: PostgreSQL est fourni par Railway comme service séparé
# Ce fichier est pour déploiement local en production (sans Railway)

version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: internet-access-backend-prod
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      # Pour Railway, utilisez les variables ${{Postgres.PGHOST}}, etc.
      # Pour déploiement local, configurez ces variables dans .env
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      MIKROTIK_HOST: ${MIKROTIK_HOST}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-8728}
      MIKROTIK_USER: ${MIKROTIK_USER}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@unikin.cd}
      APP_NAME: ${APP_NAME:-Club Internet Access UNIKIN}
    # Pour Railway, PostgreSQL est un service séparé, pas de depends_on
    # Pour déploiement local, décommentez la section postgres ci-dessous
    networks:
      - internet-access-network-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Limites de ressources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # PostgreSQL pour déploiement local (optionnel)
  # Pour Railway, utilisez le service PostgreSQL fourni par Railway
  # postgres:
  #   image: postgres:14-alpine
  #   container_name: internet-access-postgres-prod
  #   environment:
  #     POSTGRES_USER: ${DB_USERNAME}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #     POSTGRES_DB: ${DB_DATABASE}
  #   volumes:
  #     - postgres_data_prod:/var/lib/postgresql/data
  #   networks:
  #     - internet-access-network-prod

networks:
  internet-access-network-prod:
    driver: bridge
    # Optionnel: réseau interne uniquement
    # internal: true
