services:
  - type: web
    name: internet-access-backend-prod
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: internet-access-postgres-prod
          property: host
      - key: DB_PORT
        fromDatabase:
          name: internet-access-postgres-prod
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: internet-access-postgres-prod
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: internet-access-postgres-prod
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: internet-access-postgres-prod
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: internet-access-postgres-prod
    plan: free
    databaseName: school_db
    user: school_user

