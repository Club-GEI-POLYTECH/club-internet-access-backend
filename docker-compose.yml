version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: internet_access_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internet_access_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: internet-access-backend-prod
    ports:
      - "${PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      # Variables PG* (Railway - priorité 1)
      # Railway injecte automatiquement ces variables depuis le service PostgreSQL
      # Si le service PostgreSQL s'appelle "postgres", Railway utilise ${{Postgres.PGHOST}}
      # Note: Docker-compose ne peut pas utiliser ${{...}}, mais Railway les injecte automatiquement
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE}
      # Variables DB_* (fallback pour local/Docker)
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-${DB_USER}}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-${DB_NAME}}
      # Autres variables
      JWT_SECRET: ${JWT_SECRET}
      MIKROTIK_HOST: ${MIKROTIK_HOST}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-8728}
      MIKROTIK_USER: ${MIKROTIK_USER}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@unikin.cd}
      APP_NAME: ${APP_NAME:-Club Internet Access UNIKIN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internet_access_network

volumes:
  postgres_data:
    driver: local

networks:
  internet_access_network:
    driver: bridge
