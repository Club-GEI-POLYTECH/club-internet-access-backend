version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: internet_access_postgres_prod
    environment:
      # Valeurs par défaut si .env absent (évite "POSTGRES_PASSWORD not specified")
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-internet_access}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internet_access_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: internet-access-backend-prod
    ports:
      - "${PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      # Variables PG* (Railway les injecte ; en local, fallback sur postgres)
      PGHOST: ${PGHOST:-postgres}
      PGPORT: ${PGPORT:-5432}
      PGUSER: ${PGUSER:-${DB_USER:-postgres}}
      PGPASSWORD: ${PGPASSWORD:-${DB_PASSWORD:-postgres}}
      PGDATABASE: ${PGDATABASE:-${DB_NAME:-internet_access}}
      # Variables DB_* (fallback pour local/Docker)
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-${DB_USER:-postgres}}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-${DB_NAME:-internet_access}}
      # Autres variables (valeurs par défaut pour Docker local si .env absent)
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-secret}
      MIKROTIK_HOST: ${MIKROTIK_HOST:-192.168.88.1}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-8728}
      MIKROTIK_USER: ${MIKROTIK_USER:-admin}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@unikin.cd}
      APP_NAME: ${APP_NAME:-Club Internet Access UNIKIN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internet_access_network

volumes:
  postgres_data:
    driver: local

networks:
  internet_access_network:
    driver: bridge
